name: CI/CD - Build, Test & Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  BACKEND_IMAGE:  ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug — СМОТРИ СТРУКТУРУ
      - name: Debug project structure
        run: ls -R

      # 3. Docker setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 5. BUILD (с защитой от ошибки)
      - name: Build backend image
        run: |
          if [ -d "backend" ]; then
            docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -t ${{ env.BACKEND_IMAGE }}:latest ./backend
          else
            echo "❌ backend folder not found"
            exit 1
          fi

      - name: Build frontend image
        run: |
          if [ -d "frontend" ]; then
            docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend
          else
            echo "❌ frontend folder not found"
            exit 1
          fi

      # 6. Network
      - name: Create network
        run: docker network create todo-network

      # 7. DB
      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name todo_db \
            --network todo-network \
            -e POSTGRES_DB=todoapp \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:16-alpine

          for i in $(seq 1 20); do
            docker exec todo_db pg_isready -U postgres && break
            sleep 2
          done

      # 8. Backend
      - name: Start backend
        run: |
          docker run -d \
            --name backend \
            --network todo-network \
            -p 3001:3001 \
            ${{ env.BACKEND_IMAGE }}:latest

          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/api/tasks && break
            sleep 3
          done

      # 9. Frontend
      - name: Start frontend
        run: |
          docker run -d \
            --name todo_frontend \
            --network todo-network \
            -p 5173:5173 \
            ${{ env.FRONTEND_IMAGE }}:latest

          for i in $(seq 1 15); do
            curl -sf http://localhost:5173 && break
            sleep 3
          done

      # 10. Simple tests
      - name: Test API
        run: |
          curl -f http://localhost:3001/api/tasks

      # 11. Push
      - name: Push backend
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Push frontend
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      # 12. Cleanup
      - name: Cleanup
        if: always()
        run: |
          docker stop todo_frontend backend todo_db 2>/dev/null || true
          docker rm todo_frontend backend todo_db 2>/dev/null || true
          docker network rm todo-network 2>/dev/null || true
          docker rmi ${{ env.BACKEND_IMAGE }}:latest 2>/dev/null || true
          docker rmi ${{ env.FRONTEND_IMAGE }}:latest 2>/dev/null || true