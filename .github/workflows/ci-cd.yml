name: CI/CD - Build, Test & Push

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  BACKEND_IMAGE:  ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend

jobs:
  build-test-push:
    name: Build → Test → Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ✅ FIX: build в одну строку
      - name: Build backend image
        run: docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -t ${{ env.BACKEND_IMAGE }}:latest ./backend

      - name: Build frontend image
        run: docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend

      - name: Create Docker network
        run: docker network create todo-network

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name todo_db \
            --network todo-network \
            -e POSTGRES_DB=todoapp \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 \
            postgres:16-alpine

          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 20); do
            if docker exec todo_db pg_isready -U postgres > /dev/null 2>&1; then
              echo "PostgreSQL ready"
              break
            fi
            sleep 2
          done

      - name: Start backend
        run: |
          docker run -d \
            --name backend \
            --network todo-network \
            -e DB_HOST=todo_db \
            -e DB_PORT=5432 \
            -e DB_NAME=todoapp \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e PORT=3001 \
            -p 3001:3001 \
            ${{ env.BACKEND_IMAGE }}:latest

          echo "Waiting backend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/api/tasks > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 3
          done

      - name: Start frontend
        run: |
          docker run -d \
            --name todo_frontend \
            --network todo-network \
            -p 5173:5173 \
            ${{ env.FRONTEND_IMAGE }}:latest

          echo "Waiting frontend..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 3
          done

      - name: Show containers
        run: docker ps

      # ─── TESTS ─────────────────────────────────────────────

      - name: Test GET /tasks
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/tasks)
          [ "$code" = "200" ] || exit 1

      - name: Test POST /tasks
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST http://localhost:3001/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"test"}')

          CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          [ "$CODE" = "201" ] || exit 1

          ID=$(echo "$BODY" | grep -o '"id":[0-9]*' | cut -d: -f2)
          echo "TASK_ID=$ID" >> $GITHUB_ENV

      - name: Test DELETE
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
          -X DELETE http://localhost:3001/api/tasks/${{ env.TASK_ID }})
          [ "$code" = "200" ] || exit 1

      # ─── PUSH ─────────────────────────────────────────────

      - name: Push backend
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Push frontend
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      # ─── CLEANUP ──────────────────────────────────────────

      - name: Cleanup
        if: always()
        run: |
          docker stop todo_frontend backend todo_db 2>/dev/null || true
          docker rm todo_frontend backend todo_db 2>/dev/null || true
          docker network rm todo-network 2>/dev/null || true
          docker rmi ${{ env.BACKEND_IMAGE }}:latest 2>/dev/null || true
          docker rmi ${{ env.FRONTEND_IMAGE }}:latest 2>/dev/null || true